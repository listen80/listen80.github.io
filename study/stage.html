<!DOCTYPE html>
<html>

<head>
    <title></title>
    <style type="text/css">
    html,
    body,
    .canvas-wrap {
        height: 100%;
        width: 100%;
        margin: 0;
    }

    canvas {
        vertical-align: top;
    }
    </style>
</head>

<body>
    <div class="canvas-wrap">
        <canvas id="cas"></canvas>
    </div>
    <script>
    function Stage(elm) {
        this.cas = document.getElementById(elm);
        this.ctx = this.cas.getContext("2d");
        this.counts = 200; //最大粒子数
        this.particlesArr = [];

        this.init();
    }

    Stage.prototype = {
        resize: function(booleam) {
            this.width = this.cas.width = booleam ? this.cas.parentNode.clientWidth : window.innerWidth;
            this.height = this.cas.height = booleam ? this.cas.parentNode.clientHeight : window.innerHeight;
        },
        clear: function() {
            this.ctx.clearRect(0, 0, this.width, this.height);
        },
        createParticles: function() {
            var halfWidth = this.width / 2,
                halfHeight = this.height / 2;


            for (var i = 0; i < this.counts; i++) {
                var r = Math.floor(Math.random() * 255),
                    g = Math.floor(Math.random() * 255),
                    b = Math.floor(Math.random() * 255);
                var maxz = 500;
                var circle = new Circle({
                    maxz,
                    ctx: this.ctx,
                    fl: 100,
                    posx: Math.random() * this.width - halfWidth,
                    posy: Math.random() * this.height - halfHeight,
                    posz: Math.random() * maxz,
                    size: Math.random() * 5 + 10,
                    speed: Math.random() * 4 + 3,
                    origin: {
                        x: halfWidth,
                        y: halfHeight
                    },
                    color: 'rgba(' + r + ',' + g + ',' + b + ',1)',
                });
                this.particlesArr.push(circle);
            }
        },
        render: function() {
            this.clear();

            this.particlesArr.forEach(function(circle) {
                circle.draw();
            })
        },
        animate: function() {
            this.render();
            window.requestAnimationFrame(() => {
                this.animate();
            });
        },
        init: function() {
            this.resize(true);
            this.createParticles();
            this.animate();
        }
    }

    function Circle(config) {
        this.ctx = config['ctx'];
        this.fl = config['fl'];
        this.posx = config['posx'];
        this.posy = config['posy'];
        this.posz = config['posz'];
        this.origenZ = config['posz'];
        this.r = config['size'] / 2

        this.x = this.posx;
        this.y = this.posy;
        this.origin = config['origin'];
        this.speed = config['speed'];
        this.color = config['color'] ? config['color'] : "#fff";
        this.maxz = config.maxz || 1000;
    }
    Circle.prototype = {
        //3D坐标投影
        projection: function() {
            var scale = 0;
            if (this.posz > -this.fl) {
                scale = this.fl / (this.fl + this.posz);
            } else {
                this.posz = this.maxz;
            }
            this.x = this.origin.x + this.posx * scale;
            this.y = this.origin.y + this.posy * scale;
            this.size = this.r * scale;
            this.posz -= this.speed;
        },
        draw: function() {
            this.projection();
            this.ctx.save();
            this.ctx.fillStyle = this.color;
            this.ctx.translate(this.x, this.y);
            this.ctx.beginPath();
            this.ctx.arc(-this.r, -this.r, this.size, 0, Math.PI * 2, true);
            this.ctx.closePath();
            this.ctx.fill();
            this.ctx.restore();
        }
    }

    new Stage("cas");
    </script>
</body>

</html>
