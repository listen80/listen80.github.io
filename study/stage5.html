<!DOCTYPE html>
<html>

<head>
    <title></title>
    <style type="text/css">
    html,
    body,
    .canvas-wrap {
        height: 100%;
        width: 100%;
        margin: 0;
    }

    canvas {
        vertical-align: top;
    }

    .btn-wrap {
        position: absolute;
        top: 0;
    }
    </style>
</head>

<body>
    <div class="canvas-wrap">
        <canvas id="cas"></canvas>
        <div class="btn-wrap">
            <button class="btn js-btn" data="reset">reset</button>
            <button class="btn js-btn" data="demo-1">rotate</button>
            <button class="btn js-btn" data="demo-2">matrix旋转</button>
            <button class="btn js-btn" data="demo-3">rotate+scale</button>
            <button class="btn js-btn" data="demo-4">matrixMultiplication</button>
            <button class="btn js-btn" data="demo-5">matrixMultiplication3</button>
        </div>
    </div>
    <script>
    /* 这个是自写的矩阵变化基础库，对应上面四个基础变换矩阵 */
    ! function(root, fatory) {
        if ('define' in root && define.cmd) {
            define(function(require, exports, module) {
                module.exports = fatory()
            })
        } else if (typeof module === "object" && module.exports) {
            module.exports = fatory();
        } else {
            window.matrix = fatory();
        }
    }(this, function() {
        function Matrix() {
            this.a = 1;
            this.b = 0;
            this.c = 0;
            this.d = 1;
            this.e = 0;
            this.f = 0;
        }

        Matrix.prototype = {
            reset: function() {
                this.a = 1;
                this.b = 0;
                this.c = 0;
                this.d = 1;
                this.e = 0;
                this.f = 0;

                return this;
            },

            rotate: function(angle) {
                var sin = Math.sin(Math.PI / 180 * angle),
                    cos = Math.cos(Math.PI / 180 * angle),
                    a = this.a,
                    b = this.b,
                    c = this.c,
                    d = this.d,
                    e = this.e,
                    f = this.f;

                this.a = a * cos + c * sin;
                this.b = b * cos + d * sin;
                this.c = a * (-sin) + c * cos;
                this.d = b * (-sin) + d * cos;

                return this;
            },

            scale: function(sx, sy) {
                this.a *= sx;
                this.b *= sx;
                this.c *= sy;
                this.d *= sy;

                return this;
            },

            translate: function(dx, dy) {
                var a = this.a,
                    b = this.b,
                    c = this.c,
                    d = this.d;

                this.e = a * dx + c * dy;
                this.f = b * dx + d * dy;

                return this;
            },

            skew: function(ax, ay) {
                var tanX = Math.tan(Math.PI / 180 * ax),
                    tanY = Math.tan(Math.PI / 180 * ay),
                    a = this.a,
                    b = this.b,
                    c = this.c,
                    d = this.d;

                this.a = a + c * tanY;
                this.b = b + d * tanY;
                this.c = a * tanX + c;
                this.d = b * tanX + d;

                return this;
            }
        }

        var martix = new Matrix();

        return martix;
    });
    </script>
    <script>
    function Stage(elm) {
        this.cas = document.getElementById(elm);
        this.ctx = this.cas.getContext("2d");

        this.init();
    }

    Stage.prototype = {
        resize: function(booleam) {
            this.width = this.cas.width = booleam ? this.cas.parentNode.clientWidth : window.innerWidth;
            this.height = this.cas.height = booleam ? this.cas.parentNode.clientHeight : window.innerHeight;
        },
        clear: function() {
            this.ctx.clearRect(0, 0, this.width, this.height);
        },
        createRect: function() {
            this.rect = new rect({
                ctx: this.ctx,
                width: 500,
                height: 300,
                x: this.width / 2,
                y: this.height / 2,
                angleSteps: 2
            })
        },
        eventBtn: function() {
            var me = this;
            var btns = document.querySelectorAll(".js-btn");

            btns.forEach(function(elm) {
                elm.addEventListener("click", function() {
                    me.rect.runId = this.getAttribute("data");
                }, false);
            });
        },
        render: function() {
            this.clear();
            this.rect.draw();
        },
        animate: function() {
            var _this = this;

            this.ctx.save();
            this.render();
            this.ctx.restore();

            window.requestAnimationFrame(function() {
                _this.animate();
            });
        },
        init: function() {
            this.resize(true);
            this.createRect();
            this.eventBtn();
            this.animate();
        }
    }

    function rect() {
        this.ctx = arguments[0]['ctx'];
        this.width = arguments[0]['width'];
        this.height = arguments[0]['height'];
        this.pivotX = arguments[0]['width'] / 2;
        this.pivotY = arguments[0]['height'] / 2;
        this.x = arguments[0]['x'];
        this.y = arguments[0]['y'];
        this.angleSteps = arguments[0]['angleSteps'];
        this.moveSpeed = 0;
        this.runId = "";
        this.color = arguments[0]['color'] ? arguments[0]['color'] : "#04bcd2";
    }
    rect.prototype = {
        DegToRad: function() {
            return Math.PI / 180 * this.moveSpeed;
        },
        translate: function(tx, ty) {
            this.ctx.transform(1, 0, 0, 1, tx, ty);
        },
        draw: function() {
            this.moveSpeed += this.angleSteps;
            this.ctx.translate(this.x, this.y);

            this.ctx.save();
            this.changeFun();

            this.ctx.fillStyle = this.color;
            this.ctx.fillRect(-this.pivotX, -this.pivotY, this.width, this.height);

            //绘制原点
            this.ctx.restore();
            this.ctx.beginPath();
            this.ctx.arc(0, 0, 10, 0, Math.PI * 2, false);
            this.ctx.closePath();
            this.ctx.fillStyle = "#f81264";
            this.ctx.fill();
        },
        changeFun: function() {
            switch (this.runId) {
                case "demo-1":
                    this.fun1();
                    break;
                case "demo-2":
                    this.fun2();
                    break;
                case "demo-3":
                    this.fun3();
                    break;
                case "demo-4":
                    this.fun4();
                    break;
                case "demo-5":
                    this.fun5();
                    break;
                case "reset":
                    this.reset();
                    break;
            }
        },
        fun1: function() {
            this.ctx.rotate(this.DegToRad());
        },
        fun2: function() {
            this.ctx.transform(
                Math.cos(this.DegToRad()), Math.sin(this.DegToRad()),
                -Math.sin(this.DegToRad()), Math.cos(this.DegToRad()),
                0, 0
            );
        },
        fun3: function() {
            this.ctx.rotate(this.DegToRad());
            this.ctx.scale(1.5, 1);
        },
        fun4: function() {
            this.ctx.transform(
                2 * Math.cos(this.DegToRad()), 2 * Math.sin(this.DegToRad()),
                1 * -Math.sin(this.DegToRad()), 1 * Math.cos(this.DegToRad()),
                0, 0
            )
        },
        fun5: function() {
            /* 对比 */
            // this.ctx.rotate(this.moveSpeed);
            // this.ctx.translate(10,200);
            // this.ctx.scale(2,1);


            var mat = matrix.reset().rotate(this.moveSpeed).translate(10, 200).scale(2, 1);
            // var mat = matrix.reset().skew(0,45);
            this.ctx.transform(
                mat.a,
                mat.b,
                mat.c,
                mat.d,
                mat.e,
                mat.f
            );
        },
        reset: function() {
            this.ctx.transform(1, 0, 0, 1, 0, 0);
        }
    }

    new Stage("cas");
    </script>
</body>

</html>
