        const fn = Symbol();
        context[fn] = this;

    <script type="text/javascript">
    function sqrt(x, n = 2) {
        let high = x;
        let low = 0;
        let mid = low + (high - low) / n;
        while (high - low > Number.EPSILON) {
            if (mid * mid > x) {
                high = mid;
            } else {
                low = mid;
            }
            mid = low + (high - low) / n;
        }
        mid = low + (high - low) / n;
        console.log(high)
        console.log(low)
        return mid
    }

    console.log(sqrt(2))
    console.log(Math.sqrt(2))
    </script>
    <script type="text/javascript">
    function _instanceof(obj, func) {
        let prototype = func.prototype;

        if (typeof func !== 'function') {
            throw new TypeError("Right-hand side of 'instanceof' is not callable");
        }

        if (!prototype) {
            return false;
        }

        if (['string', 'number', 'undefined', 'boolean'].includes(typeof obj) || obj === null) {
            return false;
        }

        while (obj.__proto__) {
            if (prototype === obj.__proto__) {
                return true
            } else {
                obj = obj.__proto__;
            }
        }
        return false;
    }


    console.log('new String' instanceof String, _instanceof('new String', String))
    // _instanceof('new String', document)
    </script>
    <script type="text/javascript">
    function _typeof(obj) {
        let type = Object.prototype.toString.call(obj);
        return type.substring(8, type.length - 1);
    }

    function _typeof(obj) {
        let type = Object.prototype.toString.call(obj);
        return type.substring(8, type.length - 1).toLowerCase();
