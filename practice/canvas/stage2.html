<!DOCTYPE html>
<html>

<head>
    <title></title>
    <style type="text/css">
    html,
    body,
    .canvas-wrap {
        height: 100%;
        width: 100%;
        margin: 0;
    }

    canvas {
        /*background: black;*/
        vertical-align: top;
    }
    </style>
</head>

<body>
    <div class="canvas-wrap">
        <canvas id="cas"></canvas>
    </div>
    <script>
    function Stage(elm) {
        this.cas = document.getElementById(elm);
        this.ctx = this.cas.getContext("2d");
        this.vertex = [];
        this.counts = 50;
        this.fl = 300;
        this.init();
    }

    Stage.prototype = {
        resize: function(booleam) {
            this.width = this.cas.width = booleam ? this.cas.parentNode.clientWidth : window.innerWidth;
            this.height = this.cas.height = booleam ? this.cas.parentNode.clientHeight : window.innerHeight;
        },
        clear: function() {
            this.ctx.clearRect(0, 0, this.width, this.height);
        },
        createPosition: function() {
            var circle_arr = [],
                radius_x = this.width / 4,
                radius_y = this.height / 1;

            for (var i = 0; i < this.counts; i++) {
                circle_arr.push({
                    posx: Math.random() * radius_x - radius_x / 2,
                    posy: Math.random() * radius_y - radius_y / 2,
                    posz: (Math.random() * radius_x - radius_x / 2),
                });
            }

            this.creatVertex(circle_arr);
        },
        creatVertex: function(vertex) {
            //设置原点坐标
            var origin = {
                x: this.width / 2,
                y: this.height / 2
            };

            var rotateSpeed = Math.PI / 40;

            vertex.forEach((item, i) => {
                var vex = new particle(item, this.fl, origin, rotateSpeed);
                this.vertex.push(vex);
            });
        },
        sort: function() {
            this.vertex.sort(function(a, b) { return b.posz - a.posz });
        },
        render: function() {
            this.clear();
            this.sort();
            this.vertex.forEach((e, i) => {
                e.draw(this.ctx);
            });
        },
        animate: function() {
            var _this = this;

            this.render();

            window.requestAnimationFrame(function() {
                _this.animate();
            });
        },
        init: function() {
            this.resize(true);
            this.createPosition();
            this.animate();
        }
    }

    function particle(vex, fl, origin, angle, size, color) {
        var r = Math.floor(Math.random() * 255),
            g = Math.floor(Math.random() * 255),
            b = Math.floor(Math.random() * 255);

        this.x = 0;
        this.y = 0;
        this.fl = fl; //视距
        this.origin = origin;
        this.angle = angle;
        this.posx = vex.posx;
        this.posy = vex.posy;
        this.posz = vex.posz;
        this.r = size ? size : 20;
        this.color = color ? color : 'rgba(' + r + ',' + g + ',' + b + ',0.6)';
    }

    particle.prototype = {
        //Y轴旋转
        ratateY: function() {
            var cosy = Math.cos(this.angle),
                siny = Math.sin(this.angle),
                x1 = this.posx * cosy + this.posz * siny,
                z1 = this.posz * cosy - this.posx * siny;

            this.posx = x1;
            this.posz = z1;
        },
        //3D坐标投影
        projection: function() {
            if (this.posz > -this.fl) {
                var scale = this.fl / (this.fl + this.posz);
                this.x = this.origin.x + this.posx * scale;
                this.y = this.origin.y + this.posy * scale;
                this.size = this.r * scale;
            } else {
                var scale = 1000;
                this.x = this.origin.x + this.posx * scale;
                this.y = this.origin.y + this.posy * scale;
                this.size = this.r * scale;
            }
        },
        draw: function(ctx) {
            this.ratateY();

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fillStyle = this.color;
            ctx.fill();

            this.projection();
        }
    }

    new Stage("cas");
    </script>
    </script>
</body>

</html>
