<!DOCTYPE html>
<html>

<head>
    <title></title>
    <style type="text/css">
    html,
    body,
    .canvas-wrap {
        height: 100%;
        width: 100%;
        margin: 0;
    }

    canvas {
        vertical-align: top;
    }
    </style>
</head>

<body>
    <div class="canvas-wrap">
        <canvas id="cas"></canvas>
    </div>
    <script>
    function Stage(elm) {
        this.cas = document.getElementById(elm);
        this.ctx = this.cas.getContext("2d");
        this.origin = {};
        this.vertex = [];

        this.loadImg();
    }

    Stage.prototype = {
        loadImg: function() {
            var img = new Image();
            img.src = "img/timg.jpg"; //图片路径，自行修改

            img.onload = function() {
                this.img_w = img.width;
                this.img_h = img.height;
                this.left = (this.cas.width - this.img_w) / 2;
                this.top = (this.cas.height - this.img_h) / 2;

                this.init();
            }.bind(this);
        },
        resize: function(booleam) {
            this.width = this.cas.width = booleam ? this.cas.parentNode.clientWidth : window.innerWidth;
            this.height = this.cas.height = booleam ? this.cas.parentNode.clientHeight : window.innerHeight;
        },
        clear: function() {
            this.ctx.clearRect(0, 0, this.width, this.height);
        },
        getArea: function() {
            var vertex = [
                { posx: -this.img_w / 2, posy: -this.img_h / 2, posz: 0 },
                { posx: this.img_w / 2, posy: -this.img_h / 2, posz: 0 },
                { posx: this.img_w / 2, posy: this.img_h / 2, posz: 0 },
                { posx: -this.img_w / 2, posy: this.img_h / 2, posz: 0 }
            ]

            this.creatVertex(vertex);
        },
        creatVertex: function(vertex) {
            //设置原定坐标
            var origin = {
                x: this.width / 2,
                y: this.height / 2
            };

            var rotateSpeed = Math.PI / 2 / 80;

            vertex.forEach(function(e, i) {
                var vex = new imgVertex(e, 1000, origin, rotateSpeed);
                this.vertex.push(vex);
            }.bind(this));

            this.ctx.fillStyle = "#24cb89";
            this.ctx.strokeStyle = "#24cb89";
        },
        render: function() {
            this.clear();

            this.ctx.beginPath();
            this.vertex.forEach(function(e, i) {
                e.vertexUpDate();
                this.ctx.lineTo(e.x, e.y);
            }.bind(this));
            this.ctx.closePath();
            this.ctx.stroke();
            // this.ctx.fill();
        },
        animate: function() {
            var _this = this;

            this.render();

            window.requestAnimationFrame(function() {
                _this.animate();
            });
        },
        init: function() {
            this.resize(true);
            //通过图片大小确定四个顶点坐标
            this.getArea();
            this.animate();
        }
    }

    function imgVertex(vex, fl, origin, angle) {
        this.x = 0;
        this.y = 0;
        this.fl = fl; //视距
        this.origin = origin;
        this.angle = angle;
        this.posx = vex.posx;
        this.posy = vex.posy;
        this.posz = vex.posz;
    }

    imgVertex.prototype = {
        //Y轴旋转
        ratateY: function() {
            var cosy = Math.cos(this.angle),
                siny = Math.sin(this.angle),
                x1 = this.posx * cosy + this.posz * siny,
                z1 = this.posz * cosy - this.posx * siny;

            this.posx = x1;
            this.posz = z1;
        },
        //3D坐标投影
        projection: function() {
            if (this.posz > -this.fl) {
                var scale = this.fl / (this.fl + this.posz);
                this.x = this.origin.x + this.posx * scale;
                this.y = this.origin.y + this.posy * scale;
            }
        },
        vertexUpDate: function(ctx) {
            this.ratateY();
            this.projection();
        }
    }

    new Stage("cas");
    </script>
</body>

</html>
