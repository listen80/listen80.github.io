<script type="text/javascript">
    xxx = document.querySelector('span')


    function bindMove(el) {
        const style = getComputedStyle(el);
        if (style.position === 'static') {
            el.style.position = 'relative'
        }
        let dragging = false
        let x = parseFloat(style.left) || 0;
        let y = parseFloat(style.top) || 0;

        function mousedown(e) {
            dragging = true
            baseX = e.clientX
            baseY = e.clientY
        }

        function mousemove(e) {
            if (dragging) {
                el.style.left = e.clientX - baseX + x + 'px'
                el.style.top = e.clientY - baseY + y + 'px'
            }
        }

        function mouseup(e) {
            if (dragging) {
                dragging = false
                x += e.clientX - baseX
                y += e.clientY - baseY
            }
        }


        el.addEventListener('mousedown', mousedown)
        document.addEventListener('mousemove', mousemove)
        document.addEventListener('mouseup', mouseup)
        return {
            destroy() {
                el.removeEventListener('mousedown', mousedown)
                document.removeEventListener('mousemove', mousemove)
                document.removeEventListener('mouseup', mouseup)
            },
            getPosition() {
                return { x, y }
            },
            onmosemove() {

            }
        }
    }

    bindMove(xxx);
</script>
<script type="text/javascript">
    // let currying = (fn, ...args) =>
    //     fn.length > args.length ?
    //     (...arguments) => currying(fn, ...args, ...arguments) :
    //     fn(...args)

    let currying = function (fn) {

        const refn = function () {
            arg = [].slice.call(arguments)
            if (arg.length < fn.length) {
                return function () {
                    arg = arg.concat([].slice.call(arguments))
                    return refn(arg)
                }
            } else {
                return fn.apply(fn, arg)
            }
        }
        return refn
    }
    let addSum = (a, b, c) => a + b + c
    let add = currying(addSum)
    console.log(add(1)(2)(3))
    console.log(add(1, 2)(3))
    console.log(add(1, 2, 3, 4, 5))
    console.log(add(1, 2, 3, 4, 5))
</script>
