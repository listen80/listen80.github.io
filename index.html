<!DOCTYPE html>
<html>

<head>
  <title>Listen</title>
  <link rel="shortcut icon" type="image/ico" href="favicon.ico" />
  <meta name="renderer" content="webkit">
  <meta charset="utf8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <style>
    html {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      margin: 0;
      background-color: #002;
      background-image: radial-gradient(circle at center, #046, #002);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      perspective: 2000;
      -webkit-perspective: 2000;
    }

    .title {
      margin-top: 1rem;
      margin-bottom: 0;
      font-size: 1.25rem;
    }

    .row {
      display: inline-flex;
      transform: rotateY(15deg) translateZ(-50px);
      transform-origin: left;
      transition: .5s;
    }

    .row:hover {
      transform: rotateY(0deg) translateZ(100px);
    }

    .row:hover .block {
      animation: ani .2s 1;
      -webkit-animation: ani .2s 1;
    }

    @keyframes ani {
      from {
        transform: translate(0px, 0px);
      }

      50% {
        transform: translate(0px, -30px) scale(1.1, 1.1);
      }

      to {
        transform: translate(0px, 0px);
      }
    }

    @-webkit-keyframes ani {
      from {
        transform: translate(0px, 0px);
      }

      50% {
        transform: translate(0px, -30px) scale(1.1, 1.1);
      }

      to {
        transform: translate(0px, 0px);
      }
    }

    .block {
      text-align: center;
      margin: 1rem 0 0 1.5rem;
    }

    .row:hover .block:nth-child(0) {
      animation-delay: 0.1s;
    }

    .row:hover .block:nth-child(1) {
      animation-delay: 0.2s;
    }

    .row:hover .block:nth-child(2) {
      animation-delay: 0.3s;
    }

    .row:hover .block:nth-child(3) {
      animation-delay: 0.4s;
    }

    .row:hover .block:nth-child(4) {
      animation-delay: 0.5s;
    }

    .row:hover .block:nth-child(5) {
      animation-delay: 0.6s;
    }

    .row:hover .block:nth-child(6) {
      animation-delay: 0.7s;
    }

    .row:hover .block:nth-child(7) {
      animation-delay: 0.8s;
    }

    .row:hover .block:nth-child(8) {
      animation-delay: 0.9s;
    }

    .row:hover .block:nth-child(9) {
      animation-delay: 1s;
    }

    .row:hover .block:nth-child(10) {
      animation-delay: 1.1s;
    }

    .link {
      position: relative;
      display: inline-block;
      width: 7rem;
      height: 7rem;
      line-height: 7rem;
      border-radius: 50%;
      font-size: 18px;
      color: #ddf;
      text-decoration: none;
      box-shadow: 0 0 10px 2px #0cf, 0 0 4px 2px #0cf inset, 0 0 16px #0cf inset;
      transition: transform 0.1s linear, box-shadow 0.15s linear;
    }

    .link:hover {
      box-shadow: 0 0 20px 2px #0cf, 0 0 4px 2px #0cf inset, 0 0 66px #0cf inset;
      transform: scale(1.1);
    }

    .link:before {
      content: "";
      position: absolute;
      top: 1em;
      left: 1em;
      width: 1.2em;
      height: 0.5em;
      background-color: rgba(255, 255, 255, .5);
      border-radius: 50%;
      transform: rotate(-35deg);
    }
  </style>
</head>

<body>

      <div class="block"><a class="link" href="games/chess_cn/" target="_blank">象棋Worker</a></div>
    </div>
    <div class="title">工具</div>
    <div class="row">

</html>
